name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # run unit tests for backend services in parallel
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ identity-service, account-service, transaction-service ]
    name: "Test ${{ matrix.service }}"
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install service dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest
        run: |
          if [ -d tests ] && [ "$(ls -A tests)" ]; then pytest tests || echo "no tests"; fi

  # lint/build frontend
  frontend:
    runs-on: ubuntu-latest
    name: "Frontend lint and build"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # optional: build docker images to ensure compose works
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend]
    name: "Docker compose build"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch build)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build compose services
        run: |
          cd infrastructure
          docker-compose pull || true
          docker-compose build
