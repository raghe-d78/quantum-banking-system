name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - identity-service
          - account-service

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          npm install

      - name: Run Tests
        run: |
          cd services/${{ matrix.service }}
          npm test

  docker-build:

    runs-on: ubuntu-latest
    needs: test

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker compose -f infrastructure/docker-compose.yml build