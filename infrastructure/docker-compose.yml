services:

  cockroachdb:
    image: cockroachdb/cockroach
    command: start-single-node --insecure
    container_name: cockroachdb
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--execute=SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=banque_super_secret_2026        # ← même valeur partout
      - JWT_EXPIRES=24h
      - DB_HOST=cockroachdb
      - DB_PORT=26257
      - DB_NAME=identity_db
      - ACCOUNT_SERVICE_URL=http://account-service:3002
    depends_on:
      cockroachdb:
        condition: service_healthy

  account-service:
    build:
      context: ..
      dockerfile: services/account-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - JWT_SECRET=banque_super_secret_2026        # ← même valeur partout
      - DB_HOST=cockroachdb
      - DB_PORT=26257
      - DB_NAME=account_db
    depends_on:
      cockroachdb:
        condition: service_healthy
  ledger-service:
    build:
      context: ..
      dockerfile: services/ledger-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DB_HOST=cockroachdb
      - DB_PORT=26257
      - DB_NAME=ledger_db
    depends_on:
      cockroachdb:
        condition: service_healthy
  api-gateway:
    build: ../services/api-gateway
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=banque_super_secret_2026        # ← même valeur partout
      - CORS_ORIGIN=http://localhost:5173,http://localhost:5174
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - ACCOUNT_SERVICE_URL=http://account-service:3002
    depends_on:
      - identity-service
      - account-service

  # ──────────────────────────────────────────────────────────────────────────
  # Quantum services
  # ──────────────────────────────────────────────────────────────────────────

  qkd-kms:
    build:
      context: ../services/qkd-kms
    container_name: qkd-kms
    ports:
      - "8001:8001"
    environment:
      - ENV=dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  quantum-service:
    build:
      context: ../services/quantum-service
    container_name: quantum-service
    ports:
      - "8000:8000"
    environment:
      - ENV=dev
      - QKD_KMS_URL=http://qkd-kms:8001
    depends_on:
      - qkd-kms
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Infrastructure — official upstream images only (no custom code)
  # ──────────────────────────────────────────────────────────────────────────

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway