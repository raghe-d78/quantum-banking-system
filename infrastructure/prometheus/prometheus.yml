# Prometheus configuration for Quantum Banking System
# Scrapes Prometheus itself and leaves room for future service targets.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Future targets — uncomment and extend as services expose /metrics
