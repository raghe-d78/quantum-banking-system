# nginx reverse proxy configuration for Quantum Banking System
#
# ⚠️  HTTPS / TLS TODO
# --------------------
# This configuration uses plain HTTP.  Before production deployment:
#   1. Obtain TLS certificates (e.g. Let's Encrypt via Certbot).
#   2. Replace the listen 80 block with listen 443 ssl.
#   3. Add ssl_certificate and ssl_certificate_key directives.
#   4. Add a redirect from 80 → 443.
#
# Rate limiting
# -------------
# limit_req_zone defines a shared memory zone "api_limit" keyed on client IP.
# The rate is set to 30 r/s — adjust to match your traffic profile.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate-limiting zone: 10 MB shared memory, 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    server {
        listen 80;
        server_name _;

        # Apply rate limiting with a burst allowance of 60 requests
        limit_req zone=api_limit burst=60 nodelay;

        # Proxy all requests to the API Gateway
        location / {
            proxy_pass         http://api-gateway:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Health check endpoint (bypasses rate limiting)
        location /nginx-health {
            limit_req off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
